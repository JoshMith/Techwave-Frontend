<!-- src/app/admin/views/settings/admin-settings.component.html -->

<div class="page-header">
  <h1 class="page-title">Settings</h1>
</div>

<div *ngIf="isLoading" class="loading-container" style="min-height:200px;"><div class="loading-spinner"></div></div>

<div *ngIf="!isLoading" style="display:flex;flex-direction:column;gap:1.5rem;max-width:640px;">

  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>
  <div *ngIf="errorMsg"   class="alert alert-error">{{ errorMsg }}</div>

  <!-- Profile card -->
  <div class="card">
    <div class="card-header">
      <h2 class="card-title">Admin Profile</h2>
    </div>

    <!-- View mode -->
    <div *ngIf="!isEditingProfile">
      <div style="display:flex;flex-direction:column;gap:0.5rem;">
        <div class="profile-field">
          <span class="profile-label">Name</span>
          <span class="profile-value">{{ currentUser?.name }}</span>
        </div>
        <div class="profile-field">
          <span class="profile-label">Email</span>
          <span class="profile-value">{{ currentUser?.email }}</span>
        </div>
        <div class="profile-field">
          <span class="profile-label">Phone</span>
          <span class="profile-value">{{ currentUser?.phone ?? '—' }}</span>
        </div>
        <div class="profile-field">
          <span class="profile-label">Role</span>
          <span class="profile-value">
            <span class="status-badge delivered">Admin</span>
          </span>
        </div>
      </div>
      <div style="margin-top:1.5rem;">
        <button class="btn btn-primary" (click)="startEditProfile()">Edit Profile</button>
      </div>
    </div>

    <!-- Edit mode -->
    <form *ngIf="isEditingProfile" class="product-form">
      <div class="form-group">
        <label>Name *</label>
        <input type="text" [(ngModel)]="profileForm.name" name="name" class="form-input">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="profileForm.email" name="email" class="form-input">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [(ngModel)]="profileForm.phone" name="phone" class="form-input" placeholder="+254…">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" (click)="cancelEditProfile()">Cancel</button>
        <button type="button" class="btn btn-primary" (click)="saveProfile()" [disabled]="isSavingProfile">
          {{ isSavingProfile ? 'Saving…' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>

  <!-- Password card -->
  <div class="card">
    <div class="card-header"><h2 class="card-title">Change Password</h2></div>

    <form class="product-form">
      <div class="form-group">
        <label>New Password *</label>
        <div style="position:relative;">
          <input [type]="showNewPw ? 'text' : 'password'" [(ngModel)]="passwordForm.newPassword"
            name="newPw" class="form-input" placeholder="Min 8 characters" style="padding-right:3rem;">
          <button type="button" (click)="showNewPw=!showNewPw"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;">
            {{ showNewPw ? '🙈' : '👁️' }}
          </button>
        </div>
        <!-- Strength bar -->
        <div *ngIf="passwordForm.newPassword" style="margin-top:0.5rem;">
          <div class="pw-strength" [style.width.%]="(passwordStrength / 5) * 100" [style.background]="passwordStrengthColor"></div>
          <span style="font-size:0.78rem;" [style.color]="passwordStrengthColor">{{ passwordStrengthLabel }}</span>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password *</label>
        <div style="position:relative;">
          <input [type]="showConfirmPw ? 'text' : 'password'" [(ngModel)]="passwordForm.confirmPassword"
            name="confirmPw" class="form-input" placeholder="Repeat new password" style="padding-right:3rem;">
          <button type="button" (click)="showConfirmPw=!showConfirmPw"
            style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;">
            {{ showConfirmPw ? '🙈' : '👁️' }}
          </button>
        </div>
        <span *ngIf="passwordForm.confirmPassword && passwordForm.newPassword !== passwordForm.confirmPassword"
          style="font-size:0.78rem;color:#ef4444;margin-top:0.25rem;display:block;">
          Passwords do not match
        </span>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-primary" (click)="savePassword()" [disabled]="isSavingPassword">
          {{ isSavingPassword ? 'Updating…' : 'Update Password' }}
        </button>
      </div>
    </form>
  </div>

</div>
