<!-- src/app/shared/image-lightbox/image-lightbox.component.html -->

<div class="lb-overlay" (click)="onOverlayClick($event)" role="dialog" aria-modal="true" aria-label="Image viewer">

  <!-- ── Top toolbar ─────────────────────────────────────────────────────── -->
  <div class="lb-toolbar">
    <span class="lb-counter" *ngIf="images.length > 1">
      {{ currentIndex + 1 }} / {{ images.length }}
    </span>

    <div class="lb-actions">
      <!-- Zoom out -->
      <button class="lb-btn" (click)="zoomOut()" [disabled]="scale <= 1" title="Zoom out (-)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>

      <!-- Zoom level indicator -->
      <span class="lb-zoom-level">{{ (scale * 100).toFixed(0) }}%</span>

      <!-- Zoom in -->
      <button class="lb-btn" (click)="zoomIn()" [disabled]="scale >= 4" title="Zoom in (+)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>

      <!-- Reset zoom -->
      <button class="lb-btn" (click)="resetZoom()" [disabled]="scale === 1" title="Reset zoom">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>

      <!-- Download -->
      <button class="lb-btn lb-btn-download" (click)="downloadImage()" [disabled]="isDownloading" title="Download image">
        <svg *ngIf="!isDownloading" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span *ngIf="isDownloading" class="lb-spinner"></span>
      </button>

      <!-- Close -->
      <button class="lb-btn lb-btn-close" (click)="close()" title="Close (Esc)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- ── Prev / Next arrows ──────────────────────────────────────────────── -->
  <button class="lb-arrow lb-arrow-prev" *ngIf="images.length > 1" (click)="prev()" aria-label="Previous image">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  </button>

  <!-- ── Image stage ─────────────────────────────────────────────────────── -->
  <div class="lb-stage"
    (wheel)="onWheel($event)"
    (mousedown)="onMouseDown($event)"
    (touchstart)="onTouchStart($event)"
    (touchmove)="onTouchMove($event)">

    <!-- Loading spinner -->
    <div class="lb-loading" *ngIf="isLoading">
      <div class="lb-spinner"></div>
    </div>

    <img
      #imgEl
      class="lb-image"
      [class.dragging]="isDragging"
      [class.zoomable]="scale < 4"
      [src]="currentImage.src"
      [alt]="currentImage.alt || 'Product image'"
      [style.transform]="imageTransform"
      [style.opacity]="isLoading ? 0 : 1"
      (load)="onImageLoad()"
      (loadstart)="onImageLoadStart()"
      draggable="false">
  </div>

  <button class="lb-arrow lb-arrow-next" *ngIf="images.length > 1" (click)="next()" aria-label="Next image">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  </button>

  <!-- ── Thumbnail strip ────────────────────────────────────────────────── -->
  <div class="lb-thumbs" *ngIf="images.length > 1">
    <button
      *ngFor="let img of images; let i = index"
      class="lb-thumb-btn"
      [class.active]="i === currentIndex"
      (click)="goTo(i)"
      [attr.aria-label]="'View image ' + (i + 1)">
      <img [src]="img.src" [alt]="img.alt || ''" loading="lazy">
    </button>
  </div>

  <!-- ── Keyboard hint ──────────────────────────────────────────────────── -->
  <div class="lb-hint">
    <span>← → Navigate</span>
    <span>Scroll to zoom</span>
    <span>Esc to close</span>
  </div>
</div>
