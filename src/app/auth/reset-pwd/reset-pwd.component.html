<app-header></app-header>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>
        </div>

        <div *ngIf="errorMsg" class="alert alert-error">{{ errorMsg }}</div>
        <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>

        <form (ngSubmit)="submit()" *ngIf="!successMsg" class="auth-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input id="password" type="password" [(ngModel)]="password" name="password" class="form-input"
                    placeholder="Enter new password" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                    class="form-input" placeholder="Confirm new password" required>
            </div>

            <button type="submit" class="btn-primary" [disabled]="isLoading">
                <span *ngIf="isLoading" class="spinner-sm"></span>
                {{ isLoading ? 'Resetting...' : 'Reset Password' }}
            </button>
        </form>

        <p class="auth-link" *ngIf="successMsg">
            <a routerLink="/login">Back to Login</a>
        </p>
    </div>
</div>
<app-footer></app-footer>
