<!-- src/app/agent-portal/views/agent-login/agent-login.component.html -->

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="favicon.ico" width="48" alt="TechWave">
      <div>
        <h1>TechWave Kenya</h1>
        <span class="portal-badge">Agent Portal</span>
      </div>
    </div>

    <p class="login-subtitle">Sign in to access your sales dashboard</p>

    <!-- Error -->
    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-input"
          [class.invalid]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
          placeholder="your@email.com"
          autocomplete="email">
        <span class="field-error"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']">
          Email is required
        </span>
        <span class="field-error"
          *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']">
          Please enter a valid email
        </span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-with-toggle">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            class="form-input"
            [class.invalid]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
            placeholder="••••••••"
            autocomplete="current-password">
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span class="field-error"
          *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']">
          Password is required
        </span>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="isLoading" class="spinner-small"></span>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>

    </form>

    <div class="login-footer">
      <p>Not an agent? <a routerLink="/shop">Shop the store</a></p>
      <p class="disclaimer">This portal is for authorised TechWave agents only. Agent accounts are created by TechWave admin.</p>
    </div>

  </div>
</div>
